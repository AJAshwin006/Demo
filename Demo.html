<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Missing Person Tracking System</title>

    <style>

        /* =========================
           GENERAL STYLING
        ========================== */

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family: Arial, sans-serif;

            background: #f4f7fb;

            color: #222;

            transition: 0.3s;

        }


        /* =========================
           HEADER
        ========================== */

        header {

            background: #00695c;

            color: white;

            padding: 20px;

            display: flex;

            justify-content: space-between;

            align-items: center;

        }

        header h1 {

            margin: 0;

            font-size: 24px;

        }

        #darkModeBtn {

            padding: 10px 15px;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            background: white;

            color: #00695c;

            font-weight: bold;

        }


        /* =========================
           MAIN CONTAINER
        ========================== */

        main {

            max-width: 900px;

            margin: auto;

            padding: 20px;

        }


        /* =========================
           HERO SECTION
        ========================== */

        .hero {

            text-align: center;

            padding: 40px 20px;

            background: white;

            border-radius: 15px;

            margin-bottom: 20px;

            box-shadow:
                0 3px 10px rgba(0, 0, 0, 0.1);

        }

        .hero h2 {

            color: #00695c;

            font-size: 28px;

        }

        .hero p {

            font-size: 16px;

            margin-bottom: 25px;

        }

        .hero a {

            display: inline-block;

            background: #00695c;

            color: white;

            padding: 12px 20px;

            border-radius: 8px;

            text-decoration: none;

        }

        .hero a:hover {

            background: #004d40;

        }


        /* =========================
           STATISTICS
        ========================== */

        .stats {

            display: grid;

            grid-template-columns:
                repeat(3, 1fr);

            gap: 15px;

            margin-bottom: 20px;

        }

        .card {

            background: white;

            padding: 20px;

            text-align: center;

            border-radius: 12px;

            box-shadow:
                0 3px 10px rgba(0, 0, 0, 0.1);

        }

        .card h2 {

            color: #00695c;

            font-size: 30px;

            margin: 5px;

        }

        .card p {

            margin: 5px;

        }


        /* =========================
           REPORT FORM
        ========================== */

        #report {

            background: white;

            padding: 25px;

            border-radius: 15px;

            box-shadow:
                0 3px 10px rgba(0, 0, 0, 0.1);

        }

        #report h2 {

            text-align: center;

            color: #00695c;

        }

        form {

            display: flex;

            flex-direction: column;

            gap: 15px;

        }

        input {

            width: 100%;

            padding: 14px;

            border: 1px solid #ccc;

            border-radius: 8px;

            font-size: 16px;

        }

        input:focus {

            outline: none;

            border-color: #00695c;

        }

        form button {

            padding: 15px;

            background: #00695c;

            color: white;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            font-size: 17px;

            font-weight: bold;

        }

        form button:hover {

            background: #004d40;

        }


        /* =========================
           DARK MODE
        ========================== */

        body.dark {

            background: #121212;

            color: white;

        }

        body.dark .hero,

        body.dark .card,

        body.dark #report {

            background: #1e1e1e;

        }

        body.dark .hero h2,

        body.dark .card h2,

        body.dark #report h2 {

            color: #80cbc4;

        }

        body.dark input {

            background: #2b2b2b;

            color: white;

            border-color: #555;

        }


        /* =========================
           MOBILE RESPONSIVE
        ========================== */

        @media (max-width: 600px) {

            header {

                flex-direction: column;

                gap: 15px;

                text-align: center;

            }

            header h1 {

                font-size: 20px;

            }

            .stats {

                grid-template-columns: 1fr;

            }

            .hero {

                padding: 30px 15px;

            }

            .hero h2 {

                font-size: 23px;

            }

            main {

                padding: 15px;

            }

        }

    </style>

</head>


<body>


    <!-- =========================
         HEADER
    ========================== -->

    <header>

        <h1>
            Missing Person Tracking
        </h1>

        <button id="darkModeBtn">
            🌙 Dark Mode
        </button>

    </header>


    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main>


        <!-- HERO SECTION -->

        <section class="hero">

            <h2>
                Help Find Missing People
            </h2>

            <p>
                Report missing persons and help
                connect families with their loved ones.
            </p>

            <a href="#report">
                Report Missing Person
            </a>

        </section>


        <!-- STATISTICS -->

        <section class="stats">

            <div class="card">

                <h2>
                    25
                </h2>

                <p>
                    Missing Reports
                </p>

            </div>


            <div class="card">

                <h2>
                    10
                </h2>

                <p>
                    People Found
                </p>

            </div>


            <div class="card">

                <h2>
                    15
                </h2>

                <p>
                    Active Cases
                </p>

            </div>

        </section>


        <!-- REPORT FORM -->

        <section id="report">

            <h2>
                Report Missing Person
            </h2>


            <form
                action="/report"
                method="POST"
                enctype="multipart/form-data"
            >


                <!-- NAME -->

                <input
                    type="text"
                    name="name"
                    placeholder="Missing Person Name"
                    required
                >


                <!-- AGE -->

                <input
                    type="number"
                    name="age"
                    placeholder="Age"
                    min="1"
                    max="120"
                    required
                >


                <!-- LOCATION -->

                <input
                    type="text"
                    name="location"
                    placeholder="Last Seen Location"
                    required
                >


                <!-- PHONE -->

                <input
                    type="tel"
                    name="phone"
                    placeholder="Contact Number"
                    required
                >


                <!-- PHOTO -->

                <input
                    type="file"
                    name="photo"
                    accept="image/*"
                    required
                >


                <!-- SUBMIT -->

                <button type="submit">
                    Submit Missing Person Report
                </button>


            </form>

        </section>


    </main>


    <!-- =========================
         JAVASCRIPT
    ========================== -->

    <script>

        const darkModeBtn =
            document.getElementById("darkModeBtn");


        darkModeBtn.addEventListener(
            "click",
            function () {

                document.body.classList.toggle("dark");


                if (
                    document.body.classList.contains("dark")
                ) {

                    darkModeBtn.innerText =
                        "☀️ Light Mode";

                }

                else {

                    darkModeBtn.innerText =
                        "🌙 Dark Mode";

                }

            }
        );

    </script>


</body>

</html>
